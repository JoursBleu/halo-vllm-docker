# Recipe: Gemma-4-26B-A4B-it (AWQ-4bit) on Strix Halo — vLLM
#
# VERIFIED on InferStation (gfx1151). AWQ MoE experts fall back to Triton WNA16
# fused_experts on ROCm (marlin MoE is disabled on ROCm — not a bug, see
# docs/GFX1151_NOTES.md). dense layers still go through the awq_marlin/Triton path.

recipe_version: "1"
name: Gemma4-26B-A4B-AWQ
description: vLLM serving Gemma-4-26B-A4B-it (AWQ-4bit) on Strix Halo

model: /models/gemma-4-26B-A4B-it-AWQ-4bit

container: halo-vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  max_model_len: 2304
  gpu_memory_utilization: 0.85

env: {}

# Verified serve command. Note --dtype float16 for the AWQ path on ROCm.
command: |
  vllm serve /models/gemma-4-26B-A4B-it-AWQ-4bit \
    --host {host} \
    --port {port} \
    --max-num-seqs {nseq} \
    --dtype float16 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization}

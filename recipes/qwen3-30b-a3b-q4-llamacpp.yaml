# Recipe: Qwen3-30B-A3B (Q4_K_M GGUF) on Strix Halo — llama.cpp / HIP
#
# VERIFIED on InferStation (gfx1151). llama.cpp's ROCm/HIP backend is often the
# most efficient path on Strix Halo for GGUF weights. Flash attention on
# (-fa on) works here (unlike vLLM's FLASH_ATTN).

recipe_version: "1"
name: Qwen3-30B-A3B-Q4
description: llama.cpp (HIP) serving Qwen3-30B-A3B Q4_K_M on Strix Halo

model: /models/Qwen3-30B-A3B/Qwen3-30B-A3B-Q4_K_M.gguf

# Built from ./Dockerfile.llamacpp
container: halo-llamacpp-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  ctx: 32768               # -c : shared across all -np slots
  nseq: 1                  # -np : parallel slots (each gets ctx/nseq)

env: {}

# Verified serve command. -ngl 999 offloads all layers to the GPU.
# NOTE: -c is shared across -np slots; each slot must fit input+output. Size -c
# as >= nseq * (in_len + out_len) * margin.
command: |
  llama-server \
    -m /models/Qwen3-30B-A3B/Qwen3-30B-A3B-Q4_K_M.gguf \
    -ngl 999 -fa on \
    --host {host} --port {port} \
    -c {ctx} -np {nseq}

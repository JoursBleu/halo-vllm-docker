# Recipe: Gemma-4-31B-it (Quark W8A8 INT8) on Strix Halo — vLLM
#
# VERIFIED on InferStation (gfx1151). Quark W8A8 disables marlin on ROCm and
# runs MoE through Triton fused_experts (see docs/GFX1151_NOTES.md). Keep
# --max-model-len small unless you have headroom.

recipe_version: "1"
name: Gemma4-31B-Quark-W8A8
description: vLLM serving Gemma-4-31B-it (Quark-W8A8-INT8) on Strix Halo

model: /models/Gemma-4-31B-it-Quark-W8A8-INT8

container: halo-vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32
  max_model_len: 2304
  gpu_memory_utilization: 0.85

env: {}

# Verified serve command.
command: |
  vllm serve /models/Gemma-4-31B-it-Quark-W8A8-INT8 \
    --host {host} \
    --port {port} \
    --max-num-seqs {nseq} \
    --quantization quark \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization}

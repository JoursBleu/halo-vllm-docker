# Recipe: Qwen3.6-35B-A3B (BF16) on Strix Halo — vLLM / TRITON_ATTN
#
# VERIFIED on InferStation (gfx1151). On ROCm/gfx1151 only TRITON_ATTN is a
# stable attention backend for this model — FLASH_ATTN fails (vLLM returns
# FlashAttention version None on ROCm). See docs/GFX1151_NOTES.md.

recipe_version: "1"
name: Qwen36-35B-A3B-BF16
description: vLLM serving Qwen3.6-35B-A3B (BF16) on Strix Halo, TRITON_ATTN

# Local model path (mounted into the container at /models) or a HF id.
model: /models/Qwen3.6-35B-A3B

# Container image to use (built from ./Dockerfile)
container: halo-vllm-node

mods: []

defaults:
  port: 8000
  host: 0.0.0.0
  nseq: 32                 # --max-num-seqs (concurrency ceiling)
  gpu_memory_utilization: 0.9

env: {}

# Verified serve command (TRITON_ATTN). The MoE experts run via Triton WNA16
# fused_experts; there is no marlin MoE on ROCm (see notes).
command: |
  vllm serve /models/Qwen3.6-35B-A3B \
    --host {host} \
    --port {port} \
    --max-num-seqs {nseq} \
    --dtype bfloat16 \
    --attention-backend TRITON_ATTN
